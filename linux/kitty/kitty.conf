# vim:fileencoding=utf-8:foldmethod=marker

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME

# --- CZCIONKA ---
# Używamy pełnej nazwy wykrytej przez fc-list
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# --- WYDAJNOŚĆ ---
repaint_delay    10
input_delay      3
sync_to_monitor  no

# --- WYGLĄD OKNA ---
window_padding_width 15
#window_margin_width 1.5
#window_border_width 2.0pt

#inactive_border_color #cccccc
active_border_color #FF6AC1
draw_minimal_borders yes

# Fade the text of inactive windows (0.0 is fully transparent, 1.0 is normal)
inactive_text_alpha 0.7

background_opacity   0.85
hide_window_decorations titlebar-only
confirm_os_window_close 0
initial_window_width 140c
initial_window_height 40c
remember_window_size yes
remember_window_position yes

# --- UKŁADY OKIEN (SPLITS) ---
# To pozwala na ręczne dzielenie okna (pion/poziom)
enabled_layouts splits,stack

# --- SKRÓTY KLAWISZOWE DLA SPLITÓW ---
# Otwiera nowy panel w tym samym folderze (--cwd=current)
map ctrl+shift+enter launch --location=vsplit --cwd=current
map ctrl+shift+backspace launch --location=hsplit --cwd=current

# Nawigacja między panelami
map ctrl+shift+left neighboring_window left
map ctrl+shift+right neighboring_window right
map ctrl+shift+up neighboring_window up
map ctrl+shift+down neighboring_window down

# Pełny ekran dla jednego panelu (Toggle Zoom)
map ctrl+shift+f toggle_layout stack

# Zamykanie aktywnego panelu
map ctrl+shift+w close_window

# Wyszukiwanie
# map ctrl+f search_scrollback
# Open scrollback history in fzf in new window
map ctrl+f launch --type=overlay --stdin-source=@screen_scrollback /usr/bin/fzf --ignore-case --no-sort --tac --bind "enter:execute-silent(echo -n {} | wl-copy)+abort,ctrl-y:execute-silent(echo -n {} | wl-copy)"

# for MacOS, use pbcopy instead of wl-copy
# map ctrl+f launch --type=overlay --stdin-source=@screen_scrollback /opt/homebrew/bin/fzf --ignore-case --no-sort --tac --bind "enter:execute-silent(echo -n {} | pbcopy)+abort,ctrl-y:execute-silent(echo -n {} | pbcopy)"

# --- ZACHOWANIE ---
#shell zsh
shell .
editor vim
enable_audio_bell no

# Clipboard
copy_on_select yes

# Tabs
tab_bar_edge top
tab_bar_style powerline

# Mouse
mouse_hide_wait 3.0

# Scrollback
scrollback_lines 10000

# --- USTAWIENIA KURSORA ---
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0
#cursor #f5e0dc
#cursor_text_color #11111b
