# --- CZCIONKA (Dostosowana pod Powerlevel10k) ---
# Używamy pełnej nazwy wykrytej przez fc-list
font_family      MesloLGS Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# --- WYDAJNOŚĆ (Dla Twojej 4070 Ti) ---
repaint_delay    2
input_delay      1
sync_to_monitor  yes

# --- WYGLĄD OKNA ---
window_padding_width 15
background_opacity   0.85
hide_window_decorations no
confirm_os_window_close 0

# --- UKŁADY OKIEN (SPLITS) ---
# To pozwala na ręczne dzielenie okna (pion/poziom)
enabled_layouts splits,stack

# --- SKRÓTY KLAWISZOWE DLA SPLITÓW ---
# Otwiera nowy panel w tym samym folderze (--cwd=current)
map ctrl+shift+enter launch --location=vsplit --cwd=current
map ctrl+shift+backspace launch --location=hsplit --cwd=current

# Nawigacja między panelami (H,J,K,L jak w Vimie)
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# Pełny ekran dla jednego panelu (Toggle Zoom)
map ctrl+shift+f toggle_layout stack

# Zamykanie aktywnego panelu
map ctrl+shift+w close_window

# --- KOLORY (Catppuccin Mocha) ---
background            #1e1e2e
foreground            #cdd6f4
selection_background  #585b70
selection_foreground  #cdd6f4
url_color             #f5e0dc

# Kolory ANSI
color0 #45475a
color8 #585b70
color1 #f38ba8
color9 #f38ba8
color2 #a6e3a1
color10 #a6e3a1
color3 #f9e2af
color11 #f9e2af
color4 #89b4fa
color12 #89b4fa
color5 #f5c2e7
color13 #f5c2e7
color6 #94e2d5
color14 #94e2d5
color7 #bac2de
color15 #a6adc8

# --- USTAWIENIA KURSORA ---
cursor #f5e0dc
cursor_text_color #11111b
cursor_shape beam
cursor_beam_thickness 1.5

# --- ZACHOWANIE ---
shell zsh
editor vim
enable_audio_bell no
